# Prevent directory listing and block technical/documentation URLs.
autoindex off;

# Keep 404s out of indexing.
add_header X-Robots-Tag "noindex" always;

location ~* ^/(README\.md|readme|docs|doc|deploy|how-to-deploy|installation|setup)/?$ {
    return 404;
}

location ~* \.(md|txt)$ {
    return 404;
}
