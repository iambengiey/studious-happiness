<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Academics OnCloud</title>
    <meta name="description" content="Login page for Academics OnCloud users." />
    <style>
      body{font-family:Arial,sans-serif;margin:0;background:#f5f7fb;color:#172033}
      main{max-width:520px;margin:40px auto;background:#fff;border-radius:12px;padding:24px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
      h1{margin-top:0}
      label{display:block;margin:12px 0 6px;font-weight:700}
      input,select,button{width:100%;padding:10px;border:1px solid #ccd6ea;border-radius:8px;font-size:14px}
      button{margin-top:16px;background:#0f3b8f;color:#fff;font-weight:700;cursor:pointer}
      .hint{font-size:13px;color:#4f5d78}
      a{color:#0f3b8f}
    </style>
  </head>
  <body>
    <main>
      <h1>Login</h1>
      <p class="hint">Use your school account to continue.</p>
      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@school.org" required />

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" required />

        <label for="role">Role (demo)</label>
        <select id="role" required>
          <option value="school_owner">School Owner</option>
          <option value="school_admin">School Admin</option>
          <option value="school_viewer">School Viewer</option>
          <option value="platform_admin">Platform Admin</option>
        </select>

        <label for="schoolId">School ID</label>
        <input id="schoolId" type="text" placeholder="school-001" required />

        <button type="submit">Sign in</button>
      </form>
      <p class="hint">Need help? <a href="/help/">Open Help Center</a></p>
    </main>
    <script>
      document.getElementById('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const session = {
          email: document.getElementById('email').value,
          role: document.getElementById('role').value,
          school_id: document.getElementById('schoolId').value,
          signed_in_at: new Date().toISOString()
        };
        localStorage.setItem('aoc_session', JSON.stringify(session));
        window.location.href = '/app/';
      });
    </script>
  </body>
</html>
