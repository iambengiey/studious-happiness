<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>App | Academics OnCloud</title>
    <style>
      body{font-family:Arial,sans-serif;margin:0;background:#f5f7fb;color:#172033}
      header{background:#0f3b8f;color:#fff;padding:16px 20px}
      main{max-width:980px;margin:0 auto;padding:22px}
      .card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 4px 14px rgba(0,0,0,.08);margin-bottom:16px}
      .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
      .badge{display:inline-block;padding:4px 8px;background:#eef3ff;border-radius:6px;color:#0f3b8f;font-weight:700}
      button,a.btn{padding:10px 12px;border:0;border-radius:8px;background:#0f3b8f;color:#fff;text-decoration:none;cursor:pointer;display:inline-block}
      a.link{color:#0f3b8f}
      ul{margin:8px 0 0 18px}
    </style>
  </head>
  <body>
    <header>
      <h1 style="margin:0">Academics OnCloud</h1>
    </header>
    <main>
      <section class="card">
        <h2>Session</h2>
        <p id="session">Not signed in.</p>
        <button id="logout">Sign out</button>
      </section>

      <section class="card">
        <h2>Available Functions</h2>
        <div id="functions" class="grid"></div>
      </section>

      <section class="card">
        <h2>Next step for production login</h2>
        <ul>
          <li>Connect this page to your real auth provider.</li>
          <li>Use backend APIs for invites, role updates, messaging, and data operations.</li>
          <li>Enable tenant checks with <code>school_id</code> on all API calls.</li>
        </ul>
        <p><a class="link" href="/help/">Help Center</a></p>
      </section>
    </main>
    <script>
      const sessionRaw = localStorage.getItem('aoc_session');
      if (!sessionRaw) {
        window.location.href = '/login/';
      } else {
        const session = JSON.parse(sessionRaw);
        document.getElementById('session').innerHTML =
          `Signed in as <strong>${session.email}</strong> · ` +
          `<span class="badge">${session.role}</span> · school_id: <strong>${session.school_id}</strong>`;

        const functionsByRole = {
          platform_admin: ['Invite users', 'Change roles', 'Revoke access', 'Transfer ownership', 'Manage data', 'Send messages', 'View dashboards/logs', 'Export reports'],
          school_owner: ['Invite users', 'Assign admin/viewer roles', 'Revoke access', 'Transfer ownership', 'Manage data', 'Send messages', 'View dashboards/logs', 'Export reports'],
          school_admin: ['Manage school data', 'Send messages', 'View dashboards/logs', 'Export reports'],
          school_viewer: ['View dashboards/logs', 'Export reports']
        };

        const list = functionsByRole[session.role] || [];
        const host = document.getElementById('functions');
        list.forEach((item) => {
          const box = document.createElement('div');
          box.className = 'card';
          box.innerHTML = `<strong>${item}</strong>`;
          host.appendChild(box);
        });
      }

      document.getElementById('logout').addEventListener('click', () => {
        localStorage.removeItem('aoc_session');
        window.location.href = '/login/';
      });
    </script>
  </body>
</html>
