<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Academics OnCloud</title>
    <meta name="description" content="School operations platform for administrators, staff, and families." />
    <style>
      :root { color-scheme: light; }
      body { font-family: Arial, sans-serif; margin: 0; color: #172033; background: #f5f7fb; }
      header { background: #0f3b8f; color: #fff; padding: 24px; }
      main { max-width: 960px; margin: 0 auto; padding: 32px 20px; }
      .card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 4px 14px rgba(0,0,0,.08); }
      h1 { margin: 0 0 8px; }
      .actions { margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
      a.button { text-decoration: none; padding: 10px 14px; border-radius: 8px; font-weight: 700; }
      a.primary { background: #0f3b8f; color: #fff; }
      a.secondary { background: #eef3ff; color: #0f3b8f; }
      footer { margin-top: 24px; color: #4f5d78; font-size: 14px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Academics OnCloud</h1>
      <p>Student outcomes, attendance, and communication in one place.</p>
    </header>
    <main>
      <section class="card">
        <h2>Welcome</h2>
        <p>This portal is designed for school teams and families to access dashboards, reports, and secure school communication.</p>
        <div class="actions">
          <a class="button primary" href="/login">Login</a>
          <a class="button secondary" href="/help">Help Center</a>
        </div>
      </section>
      <footer>
        © Academics OnCloud
      </footer>
    </main>
  </body>
</html>
